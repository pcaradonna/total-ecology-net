<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Total Ecology</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: Menlo, Monaco, Consolas, 'Courier New', monospace;
      font-size: clamp(0.95rem, 1.6vw, 1.1rem);
      font-weight: 400;
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 10vw;
    }

    .title {
      font-size: inherit;
      font-weight: inherit;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 1.2rem;
    }

    .subtitle {
      letter-spacing: 0.04em;
      margin-bottom: 1.2rem;
    }

    .tagline {
      letter-spacing: 0.01em;
      padding-top: 0;
      max-width: 480px;
      line-height: 1.5;
    }

    footer {
      position: fixed;
      bottom: 2rem;
      right: 2.5rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <h1 class="title">Total Ecology</h1>
    <p class="subtitle">Research Lab of Paul CaraDonna</p>
    <p class="tagline">everything, everywhere, connected</p>
  </main>
  <footer>total-ecology.net</footer>
</body>
</html>
