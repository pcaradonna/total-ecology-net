<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Total Ecology</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: Menlo, Monaco, Consolas, 'Courier New', monospace;
      font-size: clamp(0.95rem, 1.6vw, 1.1rem);
      font-weight: 400;
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 10vw;
    }

    .title {
      font-size: 1.35em;
      font-weight: inherit;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 1.2rem;
    }

    .subtitle {
      letter-spacing: 0.04em;
      margin-bottom: 1.2rem;
    }

    .tagline {
      letter-spacing: 0.01em;
      padding-top: 0;
      max-width: 480px;
      line-height: 1.5;
    }

    nav {
      position: fixed;
      top: 2rem;
      right: 2.5rem;
      z-index: 2;
      display: flex;
      gap: 1.8rem;
    }

    .nav-link {
      font-size: 0.7rem;
      color: #333;
      text-decoration: none;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .nav-link:hover {
      color: #fff;
    }

    footer {
      position: fixed;
      bottom: 2rem;
      right: 2.5rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      z-index: 1;
    }

    #ghost-trail {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    #dvd-logo {
      position: fixed;
      width: 240px;
      filter: invert(1);
      pointer-events: none;
      z-index: 0;
      transform-origin: center center;
    }
  </style>
</head>
<body>
  <nav>
  <a href="people.html" class="nav-link">people</a>
  <a href="creative.html" class="nav-link">creative inquiry</a>
</nav>
<canvas id="ghost-trail"></canvas>
  <img id="dvd-logo" src="assets/logo.png" alt="">
  <main style="position: relative; z-index: 1;">
    <h1 class="title">Total Ecology</h1>
    <p class="subtitle">Ecological Research<br>Creative Inquiry</p>
  </main>
  <footer>total-ecology.net</footer>
  <script>
    const logo      = document.getElementById('dvd-logo');
    const canvas    = document.getElementById('ghost-trail');
    const ctx       = canvas.getContext('2d');
    const offscreen = document.createElement('canvas'); // pre-rendered silhouette

    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Build a flat white filled silhouette from the logo's alpha channel
    function buildSilhouette() {
      const w = logo.offsetWidth;
      const h = logo.offsetHeight;
      offscreen.width  = w;
      offscreen.height = h;
      const offCtx = offscreen.getContext('2d');
      offCtx.drawImage(logo, 0, 0, w, h);
      offCtx.globalCompositeOperation = 'source-in';
      offCtx.fillStyle = '#aaaaaa';
      offCtx.fillRect(0, 0, w, h);
      offCtx.globalCompositeOperation = 'source-over';
    }

    let x = 120, y = 80;
    let vx = 1.3, vy = 0.9;
    let angle = 0;
    const SPIN_DEG_PER_FRAME = 360 / (30 * 60); // full rotation every 30s at 60fps

    // Discrete ghost snapshots
    const ghosts = [];
    const GHOST_EVERY  = 18;       // stamp one ghost every N frames (~3.3/sec)
    const GHOST_ALPHA  = 0.42;     // initial opacity
    const GHOST_DECAY  = 0.000117; // alpha lost per frame (fades to 0 in ~60s)
    let frameCount = 0;

    function bounce() {
      const logoW = logo.offsetWidth;
      const logoH = logo.offsetHeight;
      const maxX  = window.innerWidth  - logoW;
      const maxY  = window.innerHeight - logoH;

      x += vx;
      y += vy;
      angle += SPIN_DEG_PER_FRAME;
      frameCount++;

      if (x <= 0)    { x = 0;    vx =  Math.abs(vx); }
      if (x >= maxX) { x = maxX; vx = -Math.abs(vx); }
      if (y <= 0)    { y = 0;    vy =  Math.abs(vy); }
      if (y >= maxY) { y = maxY; vy = -Math.abs(vy); }

      logo.style.left      = x + 'px';
      logo.style.top       = y + 'px';
      logo.style.transform = 'rotate(' + angle + 'deg)';

      if (frameCount % GHOST_EVERY === 0) {
        ghosts.push({ x, y, angle, alpha: GHOST_ALPHA });
      }

      for (let i = ghosts.length - 1; i >= 0; i--) {
        ghosts[i].alpha -= GHOST_DECAY;
        if (ghosts[i].alpha <= 0) ghosts.splice(i, 1);
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const g of ghosts) {
        ctx.save();
        ctx.translate(g.x + logoW / 2, g.y + logoH / 2);
        ctx.rotate(g.angle * Math.PI / 180);
        ctx.globalAlpha = g.alpha;
        ctx.drawImage(offscreen, -logoW / 2, -logoH / 2, logoW, logoH);
        ctx.restore();
      }

      requestAnimationFrame(bounce);
    }

    function start() {
      buildSilhouette();
      bounce();
    }

    if (logo.complete) {
      start();
    } else {
      logo.addEventListener('load', start);
    }
  </script>
</body>
</html>
