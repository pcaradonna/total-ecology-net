<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Total Ecology</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: Menlo, Monaco, Consolas, 'Courier New', monospace;
      font-size: clamp(0.95rem, 1.6vw, 1.1rem);
      font-weight: 400;
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 10vw;
    }

    .title {
      font-size: inherit;
      font-weight: inherit;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 1.2rem;
    }

    .subtitle {
      letter-spacing: 0.04em;
      margin-bottom: 1.2rem;
    }

    .tagline {
      letter-spacing: 0.01em;
      padding-top: 0;
      max-width: 480px;
      line-height: 1.5;
    }

    footer {
      position: fixed;
      bottom: 2rem;
      right: 2.5rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      z-index: 1;
    }

    #dvd-logo {
      position: fixed;
      width: 240px;
      filter: invert(1);
      animation: spin 30s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <img id="dvd-logo" src="assets/logo.png" alt="">
  <main style="position: relative; z-index: 1;">
    <h1 class="title">Total Ecology</h1>
    <p class="subtitle">Ecological Research + Creative Inquiry</p>
  </main>
  <footer>total-ecology.net</footer>
  <script>
    const logo = document.getElementById('dvd-logo');
    let x = 120, y = 80;
    let vx = 1.0, vy = 0.7;

    function bounce() {
      const maxX = window.innerWidth  - logo.offsetWidth;
      const maxY = window.innerHeight - logo.offsetHeight;

      x += vx;
      y += vy;

      if (x <= 0)    { x = 0;    vx =  Math.abs(vx); }
      if (x >= maxX) { x = maxX; vx = -Math.abs(vx); }
      if (y <= 0)    { y = 0;    vy =  Math.abs(vy); }
      if (y >= maxY) { y = maxY; vy = -Math.abs(vy); }

      logo.style.left = x + 'px';
      logo.style.top  = y + 'px';

      requestAnimationFrame(bounce);
    }

    bounce();
  </script>
</body>
</html>
