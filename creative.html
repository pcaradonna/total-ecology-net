<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Output — Total Ecology</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      background: #000;
      color: #fff;
      font-family: Menlo, Monaco, Consolas, 'Courier New', monospace;
    }

    nav {
      position: fixed;
      top: 2rem;
      right: 2.5rem;
      z-index: 5;
      display: flex;
      gap: 0.6rem;
    }

    .nav-link {
      font-size: 0.55rem;
      color: #444;
      text-decoration: none;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1px solid #222;
      padding: 4px 9px;
    }

    .nav-link:hover {
      color: #fff;
      border-color: #777;
    }

    .nav-link.active {
      color: #888;
      border-color: #444;
    }

    .site-name {
      position: fixed;
      top: 2rem;
      left: 2.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #444;
      text-decoration: none;
      z-index: 5;
    }

    .site-name:hover {
      color: #fff;
    }

    main {
      padding: 7rem 2.5rem 5rem;
    }

    .page-heading {
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #2a2a2a;
      margin-bottom: 4rem;
    }

    .creative-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 5rem 3.5rem;
      max-width: 1000px;
      margin: 0 auto;
      justify-items: center;
    }

    @media (max-width: 640px) {
      .creative-grid {
        grid-template-columns: 1fr;
      }
    }

    .creative-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .creative-image-wrap {
      width: 100%;
      line-height: 0;
      margin-bottom: 1.1rem;
    }

    .creative-image-wrap img {
      width: 100%;
      height: auto;
      display: block;
      opacity: 0.92;
      transition: opacity 0.2s;
    }

    .creative-image-wrap img:hover {
      opacity: 1;
    }

    .creative-caption {
      display: flex;
      flex-direction: column;
      gap: 3px;
      text-align: center;
    }

    .creative-title {
      font-size: 0.68rem;
      color: #aaa;
      letter-spacing: 0.01em;
      line-height: 1.5;
    }

    .creative-meta {
      font-size: 0.58rem;
      color: #333;
      letter-spacing: 0.04em;
    }

    .creative-description {
      font-size: 0.6rem;
      color: #444;
      line-height: 1.7;
      margin-top: 6px;
      max-width: 420px;
    }

    .creative-pair {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .creative-pair-images {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3.5rem;
      align-items: flex-end;
      width: 100%;
    }

    .creative-pair-images img {
      width: 100%;
      height: auto;
      display: block;
      opacity: 0.92;
      transition: opacity 0.2s;
    }

    .creative-pair-images img:hover {
      opacity: 1;
    }

    footer {
      position: fixed;
      bottom: 2rem;
      right: 2.5rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.65rem;
      color: #1e1e1e;
      z-index: 5;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <a class="site-name" href="index.html">Total Ecology</a>

  <nav>
    <a href="index.html" class="nav-link">home</a>
    <a href="people.html" class="nav-link">research group</a>
    <a href="creative.html" class="nav-link active">creative output</a>
    <a href="art-science-exchange.html" class="nav-link">art-science exchange</a>
    <a href="https://paul-caradonna.com" class="nav-link">research</a>
  </nav>

  <main>
    <p class="page-heading">Creative Output</p>

    <div class="creative-grid">

      <!-- 20260320 -->
      <div class="creative-item">
        <div class="creative-image-wrap">
          <img src="assets/creative/bee-diet-longsleeve-total-ecology-20260320.png" alt="On the diet diversity of wild bumble bees">
        </div>
        <div class="creative-caption">
          <div class="creative-title">On the diet diversity of wild bumble bees</div>
        </div>
      </div>

      <!-- 20250901 — perennial plants shirt, front + back -->
      <div class="creative-pair">
        <div class="creative-pair-images">
          <img src="assets/creative/perennial-plants-front-20250901.jpg" alt="Perennial Plants of the Rockies — front">
          <img src="assets/creative/perennial-plants-back-20250901.jpg" alt="Perennial Plants of the Rockies — back">
        </div>
        <div class="creative-caption" style="margin-top: 1.1rem;">
          <div class="creative-title">Perennial Plants of the Rockies</div>
        </div>
      </div>

    </div>
  </main>

  <footer>total-ecology.net</footer>

</body>
</html>
